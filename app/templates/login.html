<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo · Bar Oasis</title>
    <!-- fuentes (Cinzel + Montserrat + Dancing Script) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <!-- Font Awesome para íconos de ojo -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/popupstyle.css') }}">
</head>
<body>

    <div class="login-container">
        <div class="oasis-card">
            <div class="login-header">
                <h2 class="subtitle">Acceso Administrativo</h2>
                <h1 class="title">Bienvenido al Bar Oasis</h1>
            </div>

            <div id="flash-container">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                {% endwith %}
            </div>

            <form method="post" action="{{ url_for('auth.login') }}"class="login-form">
                <div class="input-group">
                    <input type="text" id="username" name="username" placeholder=" " required>
                    <label for="username">Usuario</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder=" " required>
                    <i id="togglePassword" class="fa-solid fa-eye"></i>
                    <label for="password">Contraseña</label>
                </div>

                <div class="forgot-password">
                    <a href="{{ url_for('routes.recuperar_Contra') }}">¿Olvidaste tus credenciales?</a>
                </div>

                <button type="submit" class="btn-login">
                    <span>Iniciar sesión</span>
                    <span class="arrow">↪</span>
                </button>
            </form>

            <!-- pie decorativo -->
            <div class="oasis-footer">
                <span>✦</span> BAR OASIS · NOCHE ÁRABE <span>✦</span>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/Login.js') }}" > </script>
    <script src="{{url_for('static', filename='js/popup.js')}}"></script>
</body>
</html>
