<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Administrativo - Bar Oasis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@400;700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/popupstyle.css') }}">
</head>
<body>
    
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h2 class="font-script subtitle">Acceso Administrativo</h2>
                <h1 class="font-oasis title">Bienvenido al Bar Oasis</h1>
            </div>

            <div id="flash-container">
                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="flash-messages flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}
            </div>

            <form action="{{ url_for('auth.login') }}" method="POST" class="login-form">
                <div class="input-group">
                    <input type="text" id="username" name="username" placeholder="Ingrese nombre de usuario" required>
                    <label for="username">Usuario</label>
                </div>
                
                <div class="input-group">
                    <input type="password" id="password" name="password" placeholder="Ingrese contraseña" required>
                    <label for="password">Contraseña</label>
                </div>

                <button type="submit" class="btn-login font-oasis">INGRESAR</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
    <script src="{{ url_for('static', filename='js/popup.js') }}"></script>
</body>
</html>
