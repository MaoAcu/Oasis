<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña · Bar Oasis</title>
    <!-- fuentes (Cinzel + Montserrat + Dancing Script para el logo) -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/codigoRestablecer.css') }}">
</head>
<body>

    <!-- MODAL DE CONFIRMACIÓN (estilo oasis) -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="modalClose">&times;</span>
            <div class="modal-icon">✨</div>
            <h2 id="modalTitle">¡Éxito!</h2>
            <p id="modalMessage">Código verificado correctamente.</p>
        </div>
    </div>

    <main class="oasis-card">
       
        <div class="logo-oasis">
            <div class="logo-icon">OASIS</div>
            <div class="logo-sub">BAR</div>
        </div>

        <header>
            <h1>Restablecer</h1>
            <div class="lead">Ingresa el código de 6 dígitos enviado a tu email.</div>
        </header>

        <!-- Sección de código con cuadritos OTP -->
        <div class="form-section active" id="codeSection">
            
            <!-- Mensaje de error (oculto inicialmente) -->
            <div class="error-message" id="codeError">
                <span class="error-icon">❌</span>
                <span class="error-text">Código incorrecto. Verifica e intenta de nuevo.</span>
            </div>

            <form id="codeForm">
                <!-- Contenedor de los 6 inputs -->
                <div class="otp-wrapper" id="otpContainer">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="off" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="off" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="off" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="off" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="off" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autocomplete="off" required>
                </div>

                <!-- Campo oculto para almacenar el código completo -->
                <input type="hidden" id="codigoCompleto" name="codigo">

                <button type="submit" class="btn-verificar" id="submitBtn">VERIFICAR CÓDIGO</button>
            </form>

            <div class="footer-links">
                ¿No recibiste el código? <br>
                <a href="#" class="resend-link" id="resendCode">Reenviar código</a>
            </div>
        </div>

        <!-- pie decorativo -->
        <div class="oasis-footer">
            <span>✦</span> BAR OASIS · <span>✦</span>
        </div>
    </main>

    
    <script src="{{ url_for('static', filename='js/codigoRestablecer.js') }}"></script>
</body>
</html>
